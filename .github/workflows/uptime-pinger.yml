name: 🚀 Uptime Pinger

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  prepare:
    name: 📂 Read Sites List
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.set-sites.outputs.matrix }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Load Telegram Secrets
        run: |
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> $GITHUB_ENV
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> $GITHUB_ENV

      - name: 🛠️ Parse and Validate sites.json
        id: set-sites
        run: |
          if [ ! -f sites.json ]; then
            echo "Error: sites.json not found!"
            exit 1
          fi

          # Use jq to format as a compact JSON array, ensuring it's an array
          SITES_JSON=$(jq -c 'if type == "array" then . else error("Not an array") end' sites.json)

          if [ "$SITES_JSON" == "" ] || [ "$SITES_JSON" == "[]" ]; then
            echo "Error: sites.json is empty or invalid!"
            exit 1
          fi

          echo "Found sites: $SITES_JSON"
          echo "matrix=$SITES_JSON" >> $GITHUB_OUTPUT

  ping:
    name: ⚡ Ping Site
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Ensure all sites are checked even if one fails
      max-parallel: 10 # Throttle parallelism if needed
      matrix:
        site: ${{ fromJson(needs.prepare.outputs.sites) }}

    steps:
      - name: 🔍 Ping ${{ matrix.site }}
        id: perform_ping
        run: |
          SITE="${{ matrix.site }}"
          RETRY_COUNT=0
          MAX_RETRIES=2
          TIMEOUT=10 # max 10 seconds per ping
          DELAY=5 # wait 5 seconds before retrying

          echo "Starting ping for $SITE..."

          while [ $RETRY_COUNT -le $MAX_RETRIES ]; do
            # Use curl to fetch the HTTP status code.
            # -s: silent, -L: follow redirects, -w: output only status code, -o: discard body, -m: max time
            # || true prevents the step from failing immediately if curl crashes or times out
            STATUS=$(curl -sL -w "%{http_code}" -o /dev/null -m $TIMEOUT "$SITE" || true)
            
            # Ensure STATUS is a valid 3-digit HTTP code. In case of network errors or timeouts, it might be invalid or empty.
            if [[ ! "$STATUS" =~ ^[0-9]{3}$ ]]; then
              STATUS="000"
            fi
            
            # Treat HTTP 200-299 as UP
            if [[ "$STATUS" =~ ^2[0-9]{2}$ ]]; then
              echo "✅ Site is UP. (Status: $STATUS)"
              echo "✅ **$SITE** is UP (Status: $STATUS)" >> $GITHUB_STEP_SUMMARY
              echo "status=up" >> "$GITHUB_OUTPUT"
              echo "code=$STATUS" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            
            echo "⚠️ Attempt $((RETRY_COUNT + 1)) failed! (Status: $STATUS)"
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -le $MAX_RETRIES ]; then
              echo "Sleeping for $DELAY seconds before retry..."
              sleep $DELAY
            fi
          done

          echo "❌ Site is DOWN! All retries failed. (Final Status: $STATUS)"
          echo "❌ **$SITE** is DOWN! (Final Status: $STATUS)" >> $GITHUB_STEP_SUMMARY

          # Set outputs for the telegram step
          echo "status=down" >> "$GITHUB_OUTPUT"
          echo "code=$STATUS" >> "$GITHUB_OUTPUT"
          
          # Exit cleanly to not fail the job matrix over down sites,
          # allowing the alert step to run natively via 'steps.perform_ping.outputs.status'.
          exit 0

      - name: 📢 Send Telegram Alert
        # Always run conditionally based on the explicit 'down' state output from the ping step
        if: steps.perform_ping.outputs.status == 'down'
        run: |
          SITE="${{ matrix.site }}"
          STATUS="${{ steps.perform_ping.outputs.code }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Check if secrets are loaded correctly 
          # GitHub masks secrets in logs, checking length is a safer validation
          if [ -z "${{ secrets.TELEGRAM_TOKEN }}" ] || [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "⚠️ Telegram secrets not configured. Skipping alert."
            exit 1
          fi

          # Format the alert text without breaking YAML indentation
          ALERT_TEXT=$(printf "🚨 <b>UPTIME ALERT</b> 🚨\n\n<b>Site:</b> %s\n<b>Status:</b> %s (DOWN/Timeout)\n<b>Time:</b> %s\n\nPlease check your system!" "$SITE" "$STATUS" "$TIMESTAMP")

          # Use jq to safely escape JSON payload and handle newlines
          JSON_PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" \
            --arg text "$ALERT_TEXT" \
            --arg parse_mode "HTML" \
            '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode}')

          echo "Sending Telegram alert..."
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD"
            
          echo "Telegram alert sent."
